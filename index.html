  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1c2333;
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #58a6ff;

    --c1: #58a6ff;  /* Physical */
    --c2: #3fb950;  /* Networking */
    --c3: #d2a8ff;  /* Compute */
    --c4: #79c0ff;  /* Containers */
    --c5: #ffa657;  /* Cloud */
    --c6: #ff7b72;  /* App Platforms */
    --c7: #f778ba;  /* Developer */
    --c8: #56d364;  /* Observability */
    --c9: #ff9900;  /* Security */
    --c10: #a5d6ff; /* Data */
    --c11: #bc8cff; /* AI */
    --c12: #54aeff; /* Enterprise */
    --c13: #7ee787; /* Automation */
    --c14: #ffa198; /* Operations */
    --c15: #e3b341; /* Governance */
    --c16: #76e3ea; /* EUC */
    --c17: #cf9fff; /* Net Services */
    --c18: #89d185; /* Assets */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,12,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  header .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  #search {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px 8px 36px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s, width 0.3s;
  }
  #search:focus { border-color: var(--accent); width: 280px; }
  #search::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  .ctrl-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  /* STATS BAR */
  .stats {
    display: flex;
    gap: 24px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    overflow-x: auto;
  }
  .stat { display: flex; gap: 6px; align-items: center; white-space: nowrap; }
  .stat-val { color: var(--accent); font-weight: 700; }
  .stat-label { color: var(--muted); }

  /* MAIN */
  main {
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* DOMAIN CARD */
  .domain {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .domain:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .domain-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    border-left: 3px solid var(--color);
  }

  .domain-icon {
    font-size: 18px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .domain-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .domain-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    white-space: nowrap;
  }

  .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .domain.open .chevron { transform: rotate(90deg); }

  /* BODY */
  .domain-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .domain.open .domain-body { display: block; }

  /* CATEGORY */
  .cat {
    margin-top: 12px;
  }

  .cat-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--color);
    margin-bottom: 6px;
    padding-left: 4px;
    border-left: 2px solid var(--color);
    padding-left: 8px;
  }

  /* SUBCATEGORY */
  .subcat {
    margin: 8px 0 4px 12px;
  }
  .subcat-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* TAGS */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding-left: 12px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #c9d1d9;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tag:hover {
    background: rgba(88,166,255,0.1);
    border-color: rgba(88,166,255,0.3);
    color: var(--accent);
  }
  .tag.highlight {
    background: rgba(210,168,255,0.15);
    border-color: rgba(210,168,255,0.4);
    color: #d2a8ff;
  }
  .tag.new {
    border-color: rgba(63,185,80,0.4);
    color: #3fb950;
    background: rgba(63,185,80,0.08);
  }
  .tag.new::after {
    content: ' ✦';
    font-size: 9px;
  }

  /* Search highlight */
  .tag.matched {
    background: rgba(255,166,87,0.2) !important;
    border-color: rgba(255,166,87,0.6) !important;
    color: #ffa657 !important;
    font-weight: 700;
  }

  .domain.hidden { display: none; }
  .cat.hidden { display: none; }

  /* LEGEND */
  .legend {
    padding: 12px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Grid layout for wide screens */
  @media (min-width: 1400px) {
    main { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); }
  }
</style>

function countItems(domain) {
  let n = 0;
  domain.categories.forEach(cat => {
    cat.subs.forEach(sub => { n += sub.items.length; });
  });
  return n;
}

function renderDomain(d) {
  const total = countItems(d);
  const colorVar = d.color;
  let html = `<div class="domain" id="dom-${d.id}" style="--color:${colorVar}; border-color: var(--border);">
    <div class="domain-header" onclick="toggle('${d.id}')">
      <span class="domain-icon">${d.icon}</span>
      <span class="domain-title">${d.title}${d.isNew ? ' <span style="font-size:10px;color:var(--c2)">✦ NEW</span>' : ''}</span>
      <span class="domain-badge">${total} items</span>
      <span class="chevron">▶</span>
    </div>
    <div class="domain-body">`;

  d.categories.forEach(cat => {
    html += `<div class="cat" data-cat="${cat.name}">
      <div class="cat-title">${cat.name}${cat.isNew ? ' ✦' : ''}</div>`;
    cat.subs.forEach(sub => {
      html += `<div class="subcat"><div class="subcat-title">${sub.name}</div>
        <div class="tags">`;
      sub.items.forEach(item => {
        const cls = sub.isNew ? 'tag new' : 'tag';
        html += `<span class="${cls}">${item}</span>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });

  html += `</div></div>`;
  return html;
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = DATA.map(renderDomain).join('');
}

function toggle(id) {
  const el = document.getElementById('dom-' + id);
  el.classList.toggle('open');
}

function expandAll() {
  document.querySelectorAll('.domain').forEach(el => el.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.domain').forEach(el => el.classList.remove('open'));
}

let showNewOnly = false;
function toggleNew() {
  showNewOnly = !showNewOnly;
  document.getElementById('btnNew').classList.toggle('active', showNewOnly);
  document.querySelectorAll('.tag').forEach(tag => {
    if (showNewOnly) {
      tag.style.opacity = tag.classList.contains('new') ? '1' : '0.15';
    } else {
      tag.style.opacity = '';
    }
  });
}

function doSearch(q) {
  q = q.toLowerCase().trim();
  document.querySelectorAll('.tag').forEach(tag => {
    tag.classList.remove('matched');
  });

  if (!q) {
    document.querySelectorAll('.domain').forEach(d => d.classList.remove('hidden'));
    return;
  }

  document.querySelectorAll('.domain').forEach(dom => {
    const tags = dom.querySelectorAll('.tag');
    let found = false;
    tags.forEach(tag => {
      if (tag.textContent.toLowerCase().includes(q)) {
        tag.classList.add('matched');
        found = true;
      }
    });
    if (found) {
      dom.classList.remove('hidden');
      dom.classList.add('open');
    } else {
      dom.classList.add('hidden');
    }
  });
}

render();
